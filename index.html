<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Command Generator</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* Medium Blue to Lighter Blue Gradient */
            background: linear-gradient(135deg, #2980b9 0%, #6dd5fa 100%); 
            margin: 0; 
            padding: 40px 20px; 
            min-height: 100vh; 
            box-sizing: border-box;
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            /* 50% Translucent White Box */
            background: rgba(255, 255, 255, 0.5); 
            /* Frosted glass blur effect */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #222; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        h2 { color: #111; margin-top: 0; border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 10px; }
        h3 { color: #111; margin-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #222; }
        
        input[type="text"], input[type="number"], select, textarea { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            /* Keeping inputs solid white/gray so they pop against the translucent background */
            background: #fdfdfd; 
            color: #333; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-family: inherit;
            transition: border 0.3s, box-shadow 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #2980b9;
            box-shadow: 0 0 0 2px rgba(41, 128, 185, 0.3);
        }
        textarea { height: 80px; resize: vertical; }
        
        .checkbox-container { display: flex; align-items: center; margin: 20px 0; }
        .checkbox-container input[type="checkbox"] { margin: 0 10px 0 0; width: auto; cursor: pointer; transform: scale(1.2); }
        .checkbox-container label { margin: 0; font-weight: bold; cursor: pointer; color: #222; }
        
        .output-container { position: relative; margin-top: 10px; }
        .output { 
            background: #1e1e1e; 
            color: #d4d4d4; 
            padding: 15px; 
            border-radius: 6px; 
            font-family: 'Courier New', Courier, monospace; 
            word-break: break-all; 
            border: 1px solid #111; 
            min-height: 50px; 
            padding-bottom: 50px; 
        }
        .copy-btn { 
            position: absolute; 
            bottom: 12px; 
            right: 12px; 
            background: #4CAF50; 
            color: #fff; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background 0.2s; 
        }
        .copy-btn:hover { background: #45a049; }
        .note { font-size: 0.85em; color: #444; margin-top: -5px; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Command Generator</h2>

    <label for="playerName">Player Name</label>
    <div class="note">Target selector (e.g., @p, @a) or an exact player name</div>
    <input type="text" id="playerName" value="@p">
    
    <label for="item">Item Name</label>
    <div class="note">The base Minecraft item ID</div>
    <input type="text" id="item" value="minecraft:diamond_sword">

    <label for="itemName">Custom Name</label>
    <div class="note">Use & for color codes (e.g., &cEpic Sword)</div>
    <input type="text" id="itemName" value="&5Epic Sword">

    <label for="itemLore">Lore (One line per row)</label>
    <div class="note">Use & for color codes (e.g., &bLine 1)</div>
    <textarea id="itemLore">&bLine 1 of lore&#10;&aLine 2 of lore</textarea>

    <label for="enchant">Enchantment</label>
    <select id="enchant">
        <option value="16">Sharpness (ID: 16)</option>
        <option value="19">Knockback (ID: 19)</option>
        <option value="20">Fire Aspect (ID: 20)</option>
        <option value="34">Unbreaking (ID: 34)</option>
    </select>

    <label for="level">Enchantment Level</label>
    <input type="number" id="level" value="5" min="1" max="32767">

    <div class="checkbox-container">
        <input type="checkbox" id="hideFlags" checked>
        <label for="hideFlags">Hide Enchantment Tooltip (HideFlags: 1)</label>
    </div>

    <h3>Generated Command:</h3>
    <div class="output-container">
        <div class="output" id="commandOutput">/give @p ...</div>
        <button class="copy-btn" onclick="copyCommand()">Copy</button>
    </div>
</div>

<script>
    const fields = ['playerName', 'item', 'itemName', 'itemLore', 'enchant', 'level', 'hideFlags'];
    
    function generateCommand() {
        const player = document.getElementById('playerName').value || '@p';
        const item = document.getElementById('item').value || 'minecraft:diamond_sword';
        const rawItemName = document.getElementById('itemName').value;
        const rawLoreLines = document.getElementById('itemLore').value.split('\n').filter(line => line.trim() !== '');
        const enchantId = document.getElementById('enchant').value;
        const level = document.getElementById('level').value || '1';
        const hideFlags = document.getElementById('hideFlags').checked;

        let nbtParts = [];

        // Display (Name and Lore)
        let displayParts = [];
        if (rawItemName) {
            // Replace all & with §
            const formattedName = rawItemName.replace(/&/g, '§');
            displayParts.push(`Name:"${formattedName}"`);
        }
        if (rawLoreLines.length > 0) {
            // Replace all & with § for each line of lore
            const formattedLore = rawLoreLines.map(line => `"${line.replace(/&/g, '§')}"`).join(',');
            displayParts.push(`Lore:[${formattedLore}]`);
        }
        if (displayParts.length > 0) {
            nbtParts.push(`display:{${displayParts.join(',')}}`);
        }

        // Enchantments
        nbtParts.push(`ench:[{id:${enchantId},lvl:${level}}]`);

        // Hide Flags
        if (hideFlags) {
            nbtParts.push(`HideFlags:1`);
        }

        const fullCommand = `/give ${player} ${item} 1 0 {${nbtParts.join(',')}}`;
        document.getElementById('commandOutput').innerText = fullCommand;
    }

    function copyCommand() {
        const commandText = document.getElementById('commandOutput').innerText;
        navigator.clipboard.writeText(commandText).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.innerText = 'Copied!';
            setTimeout(() => {
                btn.innerText = 'Copy';
            }, 2000);
        });
    }

    // Listen for inputs to auto-update the command
    fields.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('input', generateCommand);
    });
    
    // Generate the initial command on page load
    generateCommand();
</script>

</body>
</html>
