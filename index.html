<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Command Generator</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #2980b9 0%, #6dd5fa 100%); 
            margin: 0; 
            padding: 40px 20px; 
            min-height: 100vh; 
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }
        
        .main-wrapper {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            flex-wrap: wrap;
            align-items: flex-start; 
            justify-content: center;
        }

        .container { 
            flex: 1 1 500px;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #222; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .preview-container {
            flex: 1 1 300px;
            padding: 30px 0; 
            overflow-x: auto; 
            box-sizing: border-box;
        }

        .mc-tooltip {
            background-color: rgba(17, 1, 17, 0.95);
            border: 2px solid #2a0446;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace; 
            font-size: 14px;
            line-height: 1.5;
            color: #AAAAAA;
            box-shadow: inset 0 0 0 2px rgba(17, 1, 17, 0.5), 0 10px 25px rgba(0,0,0,0.3);
            text-shadow: 2px 2px 0px #000;
            white-space: pre; 
            width: max-content; 
            min-width: 250px;
        }

        .preview-title {
            color: #fff;
            margin-top: 0;
            margin-bottom: 15px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            position: sticky; 
            left: 0;
        }

        h2 { color: #111; margin-top: 0; border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 10px; }
        h3 { color: #111; margin-bottom: 10px; margin-top: 25px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #222; }
        
        input[type="text"], input[type="number"], select, textarea { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            background: #fdfdfd; 
            color: #333; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-family: inherit;
            transition: border 0.3s, box-shadow 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #2980b9;
            box-shadow: 0 0 0 2px rgba(41, 128, 185, 0.3);
        }
        
        textarea { height: 150px; resize: vertical; } 
        
        .row { display: flex; gap: 15px; align-items: flex-end; }
        .row > div { flex: 1; }
        .row > .small-col { flex: 0 0 80px; } 

        .checkbox-group { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .checkbox-container { display: flex; align-items: center; }
        .checkbox-container input[type="checkbox"] { margin: 0 10px 0 0; width: auto; cursor: pointer; transform: scale(1.2); }
        .checkbox-container label { margin: 0; font-weight: bold; cursor: pointer; color: #222; }
        
        .output-container { position: relative; margin-top: 10px; }
        .output { 
            background: #1e1e1e; 
            color: #d4d4d4; 
            padding: 15px; 
            border-radius: 6px; 
            font-family: 'Courier New', Courier, monospace; 
            word-break: break-all; 
            border: 1px solid #111; 
            min-height: 50px; 
            padding-bottom: 50px; 
            white-space: pre-wrap; 
        }
        .btn {
            background: #4CAF50; 
            color: #fff; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background 0.2s; 
        }
        .btn:hover { background: #45a049; }
        .copy-btn { 
            position: absolute; 
            bottom: 12px; 
            right: 12px; 
            padding: 8px 16px;
        }
        .note { font-size: 0.85em; color: #444; margin-top: -5px; margin-bottom: 8px; }

        .import-section {
            background: rgba(0,0,0,0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px dashed rgba(0,0,0,0.2);
        }
        .import-section label { margin-top: 0; }
    </style>
</head>

                    </optgroup>
                </select>
            </div>
            <div>
                <label for="level">Enchant Level</label>
                <input type="number" id="level" value="5" min="1" max="32767">
            </div>
        </div>

        <div class="checkbox-group">
            <div class="checkbox-container">
                <input type="checkbox" id="autoCenterName">
                <label for="autoCenterName">Auto-Center Name</label>
            </div>
            <div class="checkbox-container">
                <input type="checkbox" id="autoCenterLore" checked>
                <label for="autoCenterLore">Auto-Center Lore</label>
            </div>
            <div class="checkbox-container">
                <input type="checkbox" id="hideFlags" checked>
                <label for="hideFlags">Hide Enchantment Tooltip (HideFlags: 1)</label>
            </div>
            <div class="checkbox-container">
                <input type="checkbox" id="useConsole">
                <label for="useConsole">Running in Console (Removes /)</label>
            </div>
        </div>

        <h3>Generated Command:</h3>
        <div class="output-container">
            <div class="output" id="commandOutput">/give @p ...</div>
            <button class="btn copy-btn" onclick="copyCommand()">Copy</button>
        </div>
    </div>

    <!-- LIVE PREVIEW SECTION -->
    <div class="preview-container">
        <h2 class="preview-title">Live Preview</h2>
        <div class="mc-tooltip" id="mcTooltip">
            <!-- Tooltip content generated by JS -->
        </div>
    </div>
</div>

<script>
    const fields = ['playerName', 'item', 'itemAmount', 'itemName', 'itemLore', 'autoCenterName', 'autoCenterLore', 'enchant', 'level', 'hideFlags', 'useConsole'];
    
    const colorMap = {
        '0': '#000000', '1': '#0000AA', '2': '#00AA00', '3': '#00AAAA',
        '4': '#AA0000', '5': '#AA00AA', '6': '#FFAA00', '7': '#AAAAAA',
        '8': '#555555', '9': '#5555FF', 'a': '#55FF55', 'b': '#55FFFF',
        'c': '#FF5555', 'd': '#FF55FF', 'e': '#FFFF55', 'f': '#FFFFFF',
        'l': 'bold', 'o': 'italic'
    };

    function stripColors(text) {
        return text.replace(/&[0-9a-fk-or]/gi, '');
    }

    function unpadText(text) {
        // We only strip spaces right at the start of the line (or immediately following the 
        // leading color code) using ^ so that spaces in the middle of sentences are never destroyed!
        let cleaned = text.replace(/^(§[0-9a-fk-or])\s+/i, '$1').replace(/^\s+/g, '');
        return cleaned.replace(/§/g, '&');
    }

    function getMCPixelWidth(text) {
        const cleanText = stripColors(text);
        let width = 0;
        for (let i = 0; i < cleanText.length; i++) {
            const char = cleanText[i];
            if (/[ilI!\.,';:\|]/.test(char)) width += 2;
            else if (/[tfk\s\(\)\[\]<>]/.test(char)) width += 4;
            else if (/[@~]/.test(char)) width += 7;
            else width += 6;
        }
        return width;
    }

    function parseToHTML(text, defaultColor = '#AAAAAA') {
        let html = '';
        let currentColor = defaultColor;
        let isBold = false;
        let isItalic = false;

        const parts = text.split(/(?=&[0-9a-fk-or])/i);
        
        parts.forEach(part => {
            if (part.startsWith('&') && part.length >= 2) {
                const code = part.charAt(1).toLowerCase();
                const content = part.substring(2);
                
                if (colorMap[code]) {
                    if (code === 'l') isBold = true;
                    else if (code === 'o') isItalic = true;
                    else if (code === 'r') {
                        currentColor = defaultColor;
                        isBold = false;
                        isItalic = false;
                    }
                    else {
                        currentColor = colorMap[code];
                        isBold = false; 
                        isItalic = false;
                    }
                }
                
                let style = `color: ${currentColor};`;
                if (isBold) style += ' font-weight: bold;';
                if (isItalic) style += ' font-style: italic;';
                
                html += `<span style="${style}">${content.replace(/ /g, '&nbsp;')}</span>`;
            } else {
                let style = `color: ${currentColor};`;
                if (isBold) style += ' font-weight: bold;';
                if (isItalic) style += ' font-style: italic;';
                
                html += `<span style="${style}">${part.replace(/ /g, '&nbsp;')}</span>`;
            }
        });
        return html;
    }

    function importCommand() {
        const cmd = document.getElementById('importCmd').value.trim();
        if (!cmd) return;

        // Reset fields
        document.getElementById('itemName').value = '';
        document.getElementById('itemLore').value = '';
        document.getElementById('itemAmount').value = '1';
        document.getElementById('enchant').value = '';
        document.getElementById('level').value = '1';
        document.getElementById('hideFlags').checked = false;
        document.getElementById('autoCenterName').checked = false; // Reset centering so imported string is raw
        
        // 1. Console vs Slash
        document.getElementById('useConsole').checked = !cmd.startsWith('/');

        // 2. Extract Player, Item, and Amount
        const baseMatch = cmd.match(/^(?:\/)?give\s+([^ \n]+)\s+([^ \n{]+)(?:\s+(\d+))?/i);
        if (baseMatch) {
            document.getElementById('playerName').value = baseMatch[1];
            document.getElementById('item').value = baseMatch[2].replace(/^minecraft:/, '');
            if (baseMatch[3]) {
                document.getElementById('itemAmount').value = baseMatch[3];
            }
        }

        // 3. Extract Custom Name
        const nameMatch = cmd.match(/Name:"((?:[^"\\]|\\.)*)"/);
        if (nameMatch) {
            // Unescape quotes first
            let text = nameMatch[1].replace(/\\"/g, '"');
            document.getElementById('itemName').value = unpadText(text);
        }

        // 4. Extract Lore
        // Advanced Regex: Captures everything in the array, completely ignoring brackets inside quotes!
        const loreMatch = cmd.match(/Lore:\[((?:\s*"(?:[^"\\]|\\.)*"\s*,?\s*)*)\]/);
        if (loreMatch) {
            const rawLoreString = loreMatch[1];
            // Extract the individual quoted strings securely
            const loreArray = rawLoreString.match(/"(?:[^"\\]|\\.)*"/g) || [];
            
            const cleanLore = loreArray.map(line => {
                // Strip the exact start/end quotes and unescape inner quotes
                let text = line.substring(1, line.length - 1).replace(/\\"/g, '"');
                let unpadded = unpadText(text);
                
                // If it unpads down to just an isolated color code, treat it as our empty space!
                if (unpadded.match(/^&[0-9a-fk-or]$/i)) return ''; 
                return unpadded;
            });
            document.getElementById('itemLore').value = cleanLore.join('\n');
        }

        // 5. Extract Enchantments
        const enchMatch = cmd.match(/ench:\[.*?id:(\d+),lvl:(\d+).*?\]/);
        if (enchMatch) {
            document.getElementById('enchant').value = enchMatch[1];
            document.getElementById('level').value = enchMatch[2];
        }

        // 6. Extract HideFlags
        if (cmd.includes('HideFlags:1')) {
            document.getElementById('hideFlags').checked = true;
        }

        const btn = document.querySelector('.import-section .btn');
        btn.innerText = 'Imported!';
        btn.style.background = '#27ae60';
        setTimeout(() => {
            btn.innerText = 'Import';
            btn.style.background = '';
        }, 1500);

        generateCommand();
    }

    function generateCommand() {
        const player = document.getElementById('playerName').value || '@p';
        const amount = document.getElementById('itemAmount').value || '1';
        
        let itemInput = document.getElementById('item').value.trim() || 'paper';
        const item = itemInput.includes(':') ? itemInput : 'minecraft:' + itemInput;
        
        let rawItemName = document.getElementById('itemName').value;
        
        let rawLoreLines = document.getElementById('itemLore').value.split('\n');
        
        while (rawLoreLines.length > 0 && rawLoreLines[rawLoreLines.length - 1].trim() === '') {
            rawLoreLines.pop();
        }
        
        rawLoreLines = rawLoreLines.map(line => line.trim() === '' ? '&f ' : line);
        
        const autoCenterName = document.getElementById('autoCenterName').checked;
        const autoCenterLore = document.getElementById('autoCenterLore').checked;
        
        const enchantId = document.getElementById('enchant').value;
        const level = document.getElementById('level').value || '1';
        const hideFlags = document.getElementById('hideFlags').checked;
        const useConsole = document.getElementById('useConsole').checked;

        let processedName = rawItemName;
        let processedLoreLines = [...rawLoreLines];

        if (autoCenterName || autoCenterLore) {
            let maxPixelWidth = 0;
            let longestIndex = -2; 
            
            if (rawItemName) {
                maxPixelWidth = getMCPixelWidth(rawItemName);
                longestIndex = -1;
            }
            
            rawLoreLines.forEach((line, index) => {
                const w = getMCPixelWidth(line);
                if (w > maxPixelWidth) {
                    maxPixelWidth = w;
                    longestIndex = index;
                }
            });

            if (maxPixelWidth % 2 !== 0) {
                if (longestIndex === -1 && rawItemName) {
                    rawItemName += ' ';
                } else if (longestIndex >= 0) {
                    rawLoreLines[longestIndex] += ' ';
                }
                maxPixelWidth += 4; 
            }

            const padLine = (line) => {
                const lineWidth = getMCPixelWidth(line);
                const spacesNeeded = Math.round((maxPixelWidth - lineWidth) / 8); 
                const padding = ' '.repeat(Math.max(0, spacesNeeded));
                
                if (line.match(/^&[0-9a-fk-or]/i)) {
                    return line.substring(0, 2) + padding + line.substring(2);
                }
                return padding + line;
            };

            if (autoCenterName && rawItemName) {
                processedName = padLine(rawItemName);
            }
            
            if (autoCenterLore && rawLoreLines.length > 0) {
                processedLoreLines = rawLoreLines.map(line => padLine(line));
            }
        }

        let tooltipHTML = '';
        if (rawItemName) {
            tooltipHTML += `<div>${parseToHTML(processedName, '#FFFFFF')}</div>`; 
        }
        
        processedLoreLines.forEach(line => {
            tooltipHTML += `<div>${parseToHTML(line, '#AA00AA')}</div>`;
        });
        
        if (enchantId !== "") {
            const enchantSelect = document.getElementById('enchant');
            const enchantName = enchantSelect.options[enchantSelect.selectedIndex].text.split(' (')[0];
            
            if (!hideFlags) {
                tooltipHTML += `<div>${parseToHTML(`&7${enchantName} ${level}`)}</div>`;
            }
        }
        
        document.getElementById('mcTooltip').innerHTML = tooltipHTML;

        let nbtParts = [];
        let displayParts = [];
        
        if (processedName) {
            displayParts.push(`Name:"${processedName.replace(/&/g, '§')}"`);
        }
        if (processedLoreLines.length > 0) {
            const formattedLore = processedLoreLines.map(line => `"${line.replace(/&/g, '§')}"`).join(',');
            displayParts.push(`Lore:[${formattedLore}]`);
        }
        if (displayParts.length > 0) {
            nbtParts.push(`display:{${displayParts.join(',')}}`);
        }

        if (enchantId !== "") {
            nbtParts.push(`ench:[{id:${enchantId},lvl:${level}}]`);
        }

        if (hideFlags) {
            nbtParts.push(`HideFlags:1`);
        }

        const commandPrefix = useConsole ? "give" : "/give";
        let nbtString = nbtParts.length > 0 ? `{${nbtParts.join(',')}}` : "";
        
        const fullCommand = `${commandPrefix} ${player} ${item} ${amount} 0 ${nbtString}`.trim();
        
        document.getElementById('commandOutput').textContent = fullCommand;
    }

    function copyCommand() {
        const commandText = document.getElementById('commandOutput').textContent;
        navigator.clipboard.writeText(commandText).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.innerText = 'Copied!';
            setTimeout(() => {
                btn.innerText = 'Copy';
            }, 2000);
        });
    }

    fields.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('input', generateCommand);
    });
    
    generateCommand();
</script>

</body>
</html>
